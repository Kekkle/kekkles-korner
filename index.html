---
layout: default
title: Home
---
<h1 class="page-heading">Kekkle's Korner</h1>
<p class="page-subtitle">A simple blog to post my stuff...</p>

<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-card">
    <h2 class="post-card-title">
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </h2>
    <time class="post-card-date" datetime="{{ post.date | date_to_xmlschema }}">
      {{ post.date | date: "%B %-d, %Y" }}
    </time>
    <p class="post-card-excerpt">{{ post.excerpt | strip_html | truncatewords: 40 }}</p>
  </li>
  {% endfor %}
</ul>
