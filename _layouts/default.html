<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 30 }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Lilita+One&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <img src="{{ '/assets/images/kekkle-logo.png' | relative_url }}" alt="Kekkle logo" class="site-logo">
        KekkleMePink
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Posts</a>
        <a href="{{ '/projects' | relative_url }}">Projects</a>
        <a href="{{ '/about' | relative_url }}">About</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container container--with-sidebar">
      <div class="content-area">
        {{ content }}
      </div>
      <aside class="sidebar">
        <h3 class="sidebar-heading">All Posts</h3>
        <ul class="sidebar-posts">
          {% for post in site.posts %}
          <li>
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>
          </li>
          {% endfor %}
        </ul>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: "%Y" }} KekkleMePink &middot; Built with Jekyll &amp; GitHub Pages</p>
    </div>
  </footer>
</body>
</html>
